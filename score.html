<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score</title>

    <!-- css style -->
    <link rel="stylesheet" href="./style.css">

    <!-- tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <section class=" flex flex-col gap-8 justify-center items-center border-2 border-yellow-600 rounded-xl m-auto mt-12 py-8
    sm:w-full
    md:w-[90%]
    lg:w-[50%]">

        <div class="w-[60%] border-2 border-yellow-600 rounded-xl sm:w-[40%]">
            <img src="./images/cup.jpg" alt="" class="size-full rounded-xl">
        </div>

        <p class="text-xl text-yellow-600">Score: <span class="text-xl text-yellow-600" id="score"></span></p>

        <button class="py-2 px-8 border-2 border-yellow-600 rounded-xl ">
            <a href="./game.html" class="text-xl text-yellow-600">Replay</a>
        </button>

        <div class="py-2 px-16 bg-yellow-400 blur-xl shadow-[2px_4px_30px_2px_gold] mt-[-20px]"></div>


    <script src="./script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const finalScore = params.get('score');
        document.getElementById('score').textContent = finalScore;
    </script>
    </section>
</body>
</html>
