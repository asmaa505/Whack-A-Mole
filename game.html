<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>

    <!-- css style -->
    <link rel="stylesheet" href="./style.css">

    <!-- tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- font familly -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">
</head>
<body>
    <section class=" flex flex-col gap-8 justify-center items-center border-2 border-yellow-600 rounded-xl m-auto mt-12 py-8
    sm:w-full
    md:w-[90%]
    lg:w-[50%]">

        <div class="flex gap-8">
            <h2 class="text-xl text-yellow-400 ">Score: <span id="score">0</span> </h2>
            <h2 class="text-xl text-yellow-400 ">Timer: <span id="time">30</span> </h2>
        </div>

        <div class="grid gap-12 grid-cols-2
        sm:grid-cols-2
        md:grid-cols-3
        " >

            <div class="size-20 border-2 border-yellow-600 rounded-lg hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg hole"></div>

            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole"></div>

            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole"></div>
            <div class="size-20 border-2 border-yellow-600 rounded-lg    hole invisible 
            sm:visible"></div>
            
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
